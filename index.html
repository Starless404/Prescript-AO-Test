<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Path of Purity</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --bright-gold: #ffdf00;
            --pure-white: #ffffff;
        }
        body { 
            background-color: #000; color: var(--gold); 
            font-family: 'Garamond', serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; padding: 20px;
            transition: background-color 2s ease; overflow-x: hidden;
        }
        .purity-box { 
            border: 1px solid var(--gold); padding: 40px; background: rgba(10, 10, 10, 0.95); 
            width: 450px; text-align: center; 
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.05); 
            position: relative;
            transition: border-width 0.5s ease;
        }
        h1 { font-size: 1.1rem; letter-spacing: 10px; color: var(--pure-white); border-bottom: 1px solid #222; padding-bottom: 15px; margin-top: 0; text-transform: uppercase; }
        #output { font-size: 1.2rem; margin: 30px 0; min-height: 90px; color: var(--pure-white); line-height: 1.7; }
        
        .btn-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        button { 
            background: #000; color: var(--gold); border: 1px solid var(--gold); 
            padding: 15px 30px; cursor: pointer; text-transform: uppercase; width: 100%; 
            transition: 0.5s; letter-spacing: 3px; font-weight: bold;
        }
        button:hover { color: #fff; border-color: var(--pure-white); background: rgba(212, 175, 55, 0.1); box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        
        .stats-display { margin-top: 30px; font-size: 0.75rem; opacity: 0.9; letter-spacing: 2px; display: flex; flex-direction: column; gap: 12px; width: 100%; border-top: 1px solid #1a1a1a; padding-top: 25px; }
        .cycle-count { color: var(--bright-gold); font-size: 0.9rem; font-weight: bold; }

        .history-container {
            width: 450px; background: rgba(0, 0, 0, 0.5); border: 1px solid #111;
            margin-top: 25px; padding: 15px; font-size: 0.85rem; color: #999;
        }
        .history-title { text-transform: uppercase; letter-spacing: 4px; margin-bottom: 15px; color: var(--gold); text-align: center; font-size: 0.7rem; }
        .history-item { margin-bottom: 8px; border-left: 1px solid var(--gold); padding: 5px 15px; }
        .history-item span { color: var(--pure-white); }
        
        strong { color: var(--bright-gold); }
    </style>
</head>
<body onload="init()">

<div class="purity-box" id="mainBox">
    <h1>【 Purity 】</h1>
    <div id="output">The Path is clear...</div>
    <div class="btn-group" id="btnArea">
        <button id="mainBtn" onclick="generateRefinement()">Receive Instruction</button>
    </div>

    <div class="stats-display">
        <span id="stepView">VESSEL PROGRESS: 0 / 7</span>
        <span class="cycle-count" id="cycleView">PURIFICATIONS COMPLETED: 0</span>
    </div>
</div>

<div class="history-container" id="historyBox">
    <div class="history-title">Chronicle of Refinement</div>
    <div id="historyList"></div>
</div>

<script>
    const actionMap = {
        "Cleanse": ["Corruption from Atlanteans", "Pirate Ships", "Bosses' Hatred"],
        "Restore": ["Treasure Charts", "Sea Charts", "Relics"],
        "Survive": ["In the Dark Sea", "In the Nimbus Sea", "In the Bronze Sea"],
        "Secure": ["Forts", "Unclaimed Islands", "Castaways"]
    };

    function init() {
        const data = JSON.parse(localStorage.getItem('purityPathData')) || { logs: [], cycles: 0 };
        updateUI(data);
    }

    function updateUI(data) {
        const step = data.logs.length;
        const cycles = data.cycles || 0;

        const intensity = step / 7;
        document.body.style.backgroundColor = `rgb(${Math.floor(45 * intensity)}, ${Math.floor(40 * intensity)}, 10)`;
        
        // Visual border reinforcement
        document.getElementById('mainBox').style.borderWidth = `${1 + (step * 0.5)}px`;

        document.getElementById('stepView').innerText = `VESSEL PROGRESS: ${step} / 7`;
        document.getElementById('cycleView').innerText = `PURIFICATIONS COMPLETED: ${cycles}`;
        
        renderLog(data.logs);
    }

    function generateRefinement() {
        const data = JSON.parse(localStorage.getItem('purityPathData')) || { logs: [], cycles: 0 };
        const step = data.logs.length + 1;
        
        const categories = Object.keys(actionMap);
        const action = categories[Math.floor(Math.random() * categories.length)];
        const target = actionMap[action][Math.floor(Math.random() * actionMap[action].length)];
        
        const multiplier = 1 + (data.cycles * 0.2) + (step * 0.1);
        let amount = Math.floor((Math.random() * 3 + 2) * multiplier);
        
        let taskText = "";

        // Context-aware grammar
        if (action === "Restore" && target === "Relics") {
            taskText = `Collect ${amount} Relics for Restoration`;
        } else if (action === "Restore" && target.includes("Charts")) {
            taskText = `Fully complete ${amount} ${target}`;
        } else if (action === "Survive") {
            taskText = `Survive ${amount} minutes ${target}`;
        } else if (action === "Cleanse") {
            taskText = `Cleanse ${amount} ${target}`;
        } else {
            taskText = `Secure ${amount} ${target}`;
        }

        document.getElementById('output').innerHTML = `Instruction ${step}:<br><strong>${taskText}</strong>`;
        document.getElementById('btnArea').innerHTML = `<button onclick="completeRefinement('${taskText}')">Refine</button>`;
    }

    function completeRefinement(taskText) {
        let data = JSON.parse(localStorage.getItem('purityPathData')) || { logs: [], cycles: 0 };
        data.logs.push(taskText);

        if (data.logs.length >= 7) {
            data.cycles = (data.cycles || 0) + 1;
            data.logs = []; 
            document.getElementById('output').innerText = "Vessel Purified. The cycle begins anew.";
        } else {
            document.getElementById('output').innerText = "The instruction has been observed.";
        }

        localStorage.setItem('purityPathData', JSON.stringify(data));
        document.getElementById('btnArea').innerHTML = `<button onclick="generateRefinement()">Receive Instruction</button>`;
        updateUI(data);
    }

    function renderLog(logs) {
        const list = document.getElementById('historyList');
        if (logs.length === 0) {
            list.innerHTML = "<div style='text-align:center; opacity:0.3;'>The chronicle is blank.</div>";
            return;
        }
        list.innerHTML = logs.map((task, i) => `<div class="history-item">Step ${i+1}: <span>${task}</span></div>`).join('');
    }
</script>
</body>
</html>
