<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Urge of Blood: Endless</title>
    <style>
        :root {
            --blood-red: #c0c0c0;
            --glow: rgba(255, 255, 255, 0);
        }

        body { 
            background-color: #000000; color: var(--blood-red); 
            font-family: 'Courier New', monospace; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; padding: 20px;
            transition: background-color 1.2s ease;
        }

        .prescript-box { 
            border: 1px solid var(--blood-red); padding: 30px; background: #111; 
            width: 450px; text-align: center; 
            box-shadow: 0 0 15px var(--glow); 
            position: relative; transition: all 1.5s ease;
            margin-bottom: 20px;
        }

        h1 { font-size: 1rem; letter-spacing: 5px; color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        #output { font-size: 1.1rem; margin: 25px 0; min-height: 60px; line-height: 1.5; color: #e0e0e0; }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; align-items: center; }

        button { 
            background: #111; color: var(--blood-red); border: 1px solid var(--blood-red); 
            padding: 10px 25px; cursor: pointer; text-transform: uppercase; transition: 0.5s; 
            width: 80%;
        }
        button:hover:not(:disabled) { color: #fff; border-color: #fff; background: #1a1a1a; }
        button:disabled { opacity: 0.2; cursor: not-allowed; }

        #completeBtn { border-color: #8b0000; color: #ff4d4d; display: none; font-weight: bold; }

        .counter-display { margin-top: 25px; font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px; display: flex; justify-content: space-around; width: 100%; }
        
        .history-container {
            width: 450px;
            border-top: 1px double #333;
            padding-top: 15px;
            font-size: 0.8rem;
            color: #666;
        }
        .history-title { text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; color: #888; text-align: center; }
        .history-item { margin-bottom: 5px; border-left: 2px solid #333; padding-left: 10px; }
        .history-item span { color: #aaa; }

        .intensity-tag { color: #ff4d4d; font-weight: bold; font-size: 0.8rem; }
        strong { color: #fff; }
    </style>
</head>
<body onload="init()">

<div class="prescript-box" id="mainBox">
    <h1>【 Blood Will 】</h1>
    <div id="output">The call is silent. Tap to listen...</div>
    
    <div class="btn-group">
        <button id="callBtn" onclick="receiveWill()">Listen to the call</button>
        <button id="completeBtn" onclick="completeTask()">Mark as Executed</button>
    </div>

    <div class="counter-display">
        <span id="countView">Step: --/7</span>
        <span id="intensityView">Intensity: 1.0x</span>
    </div>
</div>

<div class="history-container" id="historyBox">
    <div class="history-title">Will Fulfilled</div>
    <div id="historyList"></div>
</div>

<script>
    const actionMap = {
        "clear": ["Towers", "Treasure charts", "Sea Charts"],
        "kill": ["Minibosses", "Story Bosses", "Sea monsters", "Rivals"],
        "sail in": ["the Bronze Sea", "the Nimbus Sea", "the Dark Sea"]
    };

    let currentTaskText = ""; 

    function init() {
        updateAtmosphere();
        renderWillFulfilled();
    }

    // Endless version doesn't care about the date, only the log length
    function getTaskCount() {
        let data = JSON.parse(localStorage.getItem('endlessBloodLog')) || { logs: [] };
        return data.logs.length;
    }

    function updateAtmosphere() {
        const tasksDone = getTaskCount();
        const intensity = 1 + (tasksDone * 0.5);
        
        let redValue = tasksDone * 15; // Faster color ramp for endless mode
        document.body.style.backgroundColor = `rgb(${redValue}, 0, 0)`;

        document.getElementById('intensityView').innerText = `Intensity: ${intensity.toFixed(1)}x`;
        document.getElementById('countView').innerText = `Step: ${tasksDone}/7`;

        if (tasksDone >= 7) {
            document.getElementById('mainBox').style.borderColor = "#ff0000";
            document.getElementById('mainBox').style.boxShadow = "0 0 20px rgba(255, 0, 0, 0.4)";
        } else {
            document.getElementById('mainBox').style.borderColor = "var(--blood-red)";
            document.getElementById('mainBox').style.boxShadow = "none";
        }
    }

    function receiveWill() {
        const tasksDone = getTaskCount();
        const scale = 1 + (tasksDone * 0.5);

        const actions = Object.keys(actionMap);
        const selectedAction = actions[Math.floor(Math.random() * actions.length)];
        const targetList = actionMap[selectedAction];
        const selectedTarget = targetList[Math.floor(Math.random() * targetList.length)];

        const scaledRand = (min, max) => Math.floor((Math.random() * (max - min + 1) + min) * scale);
        const repAmount = Math.floor((Math.random() * (150 - 50 + 1) + 50) * scale);

        const conditionPool = [
            `${scaledRand(3, 6)} times`,
            `${scaledRand(2, 4)} times without dying`,
            `until you earn ${repAmount} reputation`,
            `for exactly ${scaledRand(1, 2)} hours`
        ];
        const selectedCondition = conditionPool[Math.floor(Math.random() * conditionPool.length)];

        currentTaskText = `${selectedAction} ${selectedTarget} ${selectedCondition}`;
        document.getElementById('output').innerHTML = `<span class="intensity-tag">[INTENSITY ${scale.toFixed(1)}x]</span><br>You must <strong>${currentTaskText}</strong>.`;
        
        document.getElementById('callBtn').style.display = 'none';
        document.getElementById('completeBtn').style.display = 'block';
    }

    function completeTask() {
        let fulfillmentData = JSON.parse(localStorage.getItem('endlessBloodLog')) || { logs: [] };

        fulfillmentData.logs.push({
            step: fulfillmentData.logs.length + 1,
            task: currentTaskText
        });

        // Handle Cycle Completion (If they finish 7, you could reset or keep going)
        // For now, we allow them to finish 7, then the next click resets.
        if (fulfillmentData.logs.length > 7) {
            fulfillmentData.logs = []; // Reset cycle
            document.getElementById('output').innerText = "A new cycle begins...";
        } else {
            document.getElementById('output').innerText = "The blood is satiated... for now.";
        }

        localStorage.setItem('endlessBloodLog', JSON.stringify(fulfillmentData));
        
        updateAtmosphere();
        renderWillFulfilled();
        
        document.getElementById('callBtn').style.display = 'block';
        document.getElementById('callBtn').innerText = "Listen to the next call";
        document.getElementById('completeBtn').style.display = 'none';
    }

    function renderWillFulfilled() {
        const fulfillmentData = JSON.parse(localStorage.getItem('endlessBloodLog'));
        const listDiv = document.getElementById('historyList');
        listDiv.innerHTML = "";

        if (fulfillmentData && fulfillmentData.logs.length > 0) {
            fulfillmentData.logs.forEach(log => {
                const item = document.createElement('div');
                item.className = "history-item";
                item.innerHTML = `Step ${log.step}: <span>${log.task}</span>`;
                listDiv.appendChild(item);
            });
        } else {
            listDiv.innerHTML = "<div style='text-align:center; opacity:0.3;'>No current progress.</div>";
        }
    }
</script>

</body>
</html>
